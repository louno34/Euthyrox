<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Euthyrox</title>
    <link rel="apple-touch-icon" href="/Euthyrox/src/img/pilule.png">
    <link rel="icon" type="image/png" href="/Euthyrox/src/img/pilule.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="card">
    <div id="day" class="date">Aujourd'hui</div>
    <div id="date-display" class="date"></div>
    <div id="dose-container" class="dose-box">
        <div id="label-display" class="label">Chargement...</div>
        <div id="mg-display">-- mg</div>
    </div>
</div>

<script>
    function updateDose() {
        const now = new Date();

        // 1. On définit la date de référence (1er Janvier 2024)
        const refDate = Date.UTC(2024, 0, 1);

        // 2. On récupère la date du jour en format UTC (Minuit)
        const todayUTC = Date.UTC(now.getFullYear(), now.getMonth(), now.getDate());

        // 3. Calcul de la différence en jours
        const diffInDays = Math.round((todayUTC - refDate) / 86400000);

        const displayDate = document.getElementById('date-display');
        const container = document.getElementById('dose-container');
        const label = document.getElementById('label-display');
        const mg = document.getElementById('mg-display');

        // Affichage de la date du jour proprement
        const options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
        displayDate.innerText = now.toLocaleDateString('fr-FR', options);

        // 4. Logique d'alternance
        if (diffInDays % 2 === 0) {
            // JOUR BLEU
            container.className = "dose-box bleu";
            label.innerText = "COULEUR : BLEU";
            mg.innerText = "150 mg";
        } else {
            // JOUR BLANC
            container.className = "dose-box blanc";
            label.innerText = "COULEUR : BLANC";
            mg.innerText = "125 mg";
        }
    }
    // Exécution au chargement
    updateDose();
</script>

</body>
</html>
